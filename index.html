\u0026 Device Management.","Navigate to \"Downloaded Profile\", then tap the Median UDID Retrieval profile to start installation.","Tap \"Install\" at the top right of the dialog to begin installation.","Enter your passcode to authenticate.","Tap \"Install\" at the bottom to complete installation."],"instructionSuccess":"Success!\u003cbr/\u003eYour UDID will be displayed.","modelTitle":"Works on all iPhones and iPads","modelTypes":{"iphone":"Works on all iPhones and iPads","iphoneModels":"iPhone 16, 15, 14, 13, 12, 11, X, and older","ipad":"All iPad models","ipadModels":"iPad Air, iPad Pro, iPad Mini","ios":"All iOS versions","iosModels":"All iOS versions"},"trustedTitle":"Trusted by","trustedSubtitle":"Median is the world’s most powerful webview app development platform trusted by leading companies.","faqTitle":"Frequently asked questions","faqs":[{"question":"What is a UDID and why is it important?","answer":"A UDID (Unique Device Identifier) is a unique alphanumeric string assigned to each iOS device. It is used by developers to identify and register devices for app testing and distribution, especially in ad hoc app deployment. Knowing your device’s UDID is essential when you want to get access to apps that are not available on the App Store."},{"question":"How can I get the UDID of my iPhone or iPad?","answer":"The easiest way to get your UDID is to open Median.co's UDID retrieval tool in Safari on your iPhone or iPad. Simply follow the prompts to install a temporary profile that securely displays your UDID without needing a computer. Alternatively, you can connect your iOS device to a Mac or PC with a USB cable, then open Finder on macOS Catalina or later, or iTunes on older macOS versions or Windows. In Finder, select your iPhone or iPad from the sidebar under Locations. In iTunes, click the device icon near the top-left of the window. Then click the serial number or identifier until the UDID appears, and copy it to your clipboard."},{"question":"Can I find my UDID without connecting to a computer?","answer":"Yes, you can get your UDID directly on your iOS device by using Safari and visiting trusted UDID retrieval websites like Median’s \u003cudidToolLink\u003eUDID retrieval tool\u003c/udidToolLink\u003e. These sites guide you through installing a temporary profile that reveals your device UDID securely without needing a computer."},{"question":"Why do developers ask for my UDID?","answer":"Developers request your UDID to register your iOS device in their Apple Developer account for ad hoc app distribution. This registration allows the app to be installed and run only on devices with registered UDIDs, ensuring controlled and secure testing environments."},{"question":"Is it safe to share my UDID?","answer":"Sharing your UDID is generally safe when done with trusted developers or organizations because it only identifies your device for app testing purposes. However, avoid sharing your UDID publicly or with untrusted sources to prevent unauthorized access or misuse."}],"shareTitle":"Share this page","sharePageViaEmail":"Via email","sharePageViaSms":"Via SMS","sharePageText":"Open this page in Safari on your iOS device to retrieve your UDID without needing a Mac: {{ url }}","createAppTitle":"Build better apps, faster. It’s never been easier.","createAppPlaceholder":"Enter any URL to try it for free","buildYourApp":"Build your app now","udidTitle":"This is your UDID:","device":"Device","udid":"UDID","copyUdid":"Copy UDID to clipboard","shareUdidViaEmail":"Share UDID via Email","shareUdidViaSms":"Share UDID via SMS","shareUdidText":"The UDID for my {{ deviceName }} is {{ udid }}","emailSubject":"My {{ deviceName }} UDID","copySuccess":"UDID copied to clipboard"}},"helpInfo":{"branding":{"brandingOverview":{"text":"The first step in configuring your app is to add an app icon and splash screen, and to select theme colors aligned with your organization's visual identity.","slug":"branding-overview"},"appIcon":{"text":"Your app icon is your app's identity and is used on the device home screen and in other locations such as settings. Upload a PNG or JPG square image to use as your app's launch icon. To avoid any blurriness we recommend a resolution of 1024x1024 pixels.","slug":"app-icon"},"splashScreen":{"text":"Configure the splash screen that displays while your app initially launches. Splash screen appearance varies between iOS and Android to meet design guidelines for each platform. The splash screen will display until your webpage finishes loading (when the DOMContentLoaded event fires) so that the transition between splash screen and your app is seamless.","slug":"splash-screen"},"themeColors":{"text":"Set a Primary Color used for text fields and labels, also referred to as the Tint color for iOS and the Accent color for Android.","slug":"theme-colors"},"statusBar":{"text":"Set default styling options and Light/Dark mode for the device status bar while your app is open. When the status bar is in Light mode it will display with black text, in Dark mode white text, in Auto mode it will follow the device Light/Dark mode setting. You may also customize and dynamically set the status bar visibility and style during runtime from your website using the Median Javascript Bridge.","slug":"status-bar"},"systemNavBar":{"text":"Set default styling options and Light/Dark mode for the system navigation bar while your app is open. When the navigation bar is in light mode it will display black icons or bars, while dark mode will show white icons. in Auto mode it will follow the device Light/Dark mode setting. You may also customize and dynamically set the status bar visibility and style during runtime from your website using the Median Javascript Bridge.","slug":"system-nav-bar"}},"interface":{"appInterfaceOverview":{"text":"App Interface settings control the functionality of your app, allowing you to optimize the app versus website experience for your users","slug":"app-interface-overview"},"screenBrightness":{"text":"This feature allows you to dynamically set the device screen brightness at runtime. This feature can be used to dim the screen for reading apps, or to brighten the screen to show a QR code for scanning such as a bus pass or hotel booking app.","slug":"screen-brightness"},"keepScreenOn":{"text":"Keep the device screen on all the time for many purposes such as a in-vehicle display app, museum kiosk app, trade show demo, etc. In addition to an app configuration which will be enabled at all times this setting can also be set and cleared via the JavaScript Bridge.","slug":"keep-screen-on"},"fullScreen":{"text":"Control whether your app is displayed in full screen. This mode can also be set at runtime from your website using the JavaScript Bridge. Note that on Android when full screen mode enabled the keyboard will overlay on top of your web content which can cause issues for users completing forms.","slug":"full-screen"},"screenOrientation":{"text":"Control whether the orientation of your app changes automatically as the device is rotated or remains fixed in portrait or landscape mode. Note that Fixed Portrait for iPad will automatically disable multi-tasking.","slug":"screen-orientation"},"darkMode":{"text":"Set the default Light/Dark mode for your app. The Auto mode follows the device setting for Light \u0026amp; Dark Mode, but you can set Light or Dark to force a mode irrespective of the device setting. The current mode can also be changed at runtime using the Median JavaScript Bridge.","slug":"dark-mode"},"nativePageTransitions":{"text":"With native page transitions enabled a loading spinner will show when loading new pages within your app. The current page will fade out, the loading spinner will be displayed, and then the new page will fade in when it has finished loading.","slug":"native-page-transitions"},"pullToRefresh":{"text":"Pull-to-refresh adds the ability for the user to refresh the current page by swiping down from the top of the screen. This functionality can be independently enabled for iOS and Android.","slug":"pull-to-refresh"},"swipeGestures":{"text":"Add swipe gestures to your app to enable swiping to go back and forward in the navigation history. On Android, arrow indicators will show on the screen to indicate when there is a page available to go back to or to go forward to.","slug":"swipe-gestures"},"pinchToZoom":{"text":"Add pinch-to-zoom functionality so that users can use two fingers to zoom in and out within your app. This feature is disabled by default as in some scenarios the behavior may not be required.","slug":"pinch-to-zoom"},"dynamicType":{"text":"When enabled the text on pages displayed within your iOS app will adjust in size according to your device's settings using the CSS property -webkit-text-size-adjust.","slug":"dynamic-type"},"fontScaling":{"text":"Set a specific scale for text in your app that is styled using relative units and ignore the device setting. e.g. Set 100% to force the default size or set 90% for smaller text than default.","slug":"font-scaling"},"webviewZoom":{"text":"Set the initial zoom level of your webview in App Studio or control it dynamically using JavaScript Bridge methods. Note that Android has a limitation preventing zoom levels below 100%.","slug":"webview-zoom"},"maximumWindows":{"text":"Set a maximum number of windows that are opened simultaneously to improve performance for resource-intensive apps. Once the maximum number of windows has been reached, then previously opened windows will be automatically closed starting with the window that was open first. Enable \"Auto Close\" so that when your primary website URL (app home screen) is opened, all other previously opened windows will be automatically closed.","slug":"maximum-windows"},"viewportWidth":{"text":"The app's viewport is the visible area of the window where content is visible. To adjust the scale of pages shown within your app, you can force a page width. Before modifying this setting, we first suggest altering the viewport meta tag on your website.","slug":"viewport-width"},"offlinePage":{"text":"Customize the offline page that will be shown when your app is offline.","slug":"offline-page"},"advancedOfflineFunctionality":{"text":"Enable advanced offline functionality to allow your app to function offline.","slug":"advanced-offline-functionality"},"iosSplitView":{"text":"Split View allows multiple apps to be open adjacently. This makes multi-tasking between apps easy so you can increase productivity.","slug":"ios-split-view"},"localization":{"text":"By default your user's default device language will be set within your app for all web content which will then display in the corresponding language in the same manner it is displayed in a regular browser, i.e. if there is an \"Accept-Language\" header present. The native UI components in the native app layer have been localized to various languages as contributed by customers. These must be selected to enable for your app.","slug":"localization"},"iosLiquidGlass":{"text":"Liquid Glass on iOS is a visual design effect introduced in iOS 26. It creates a frosted-glass appearance using dynamic blur and vibrancy, improving visual hierarchy and depth across the app interface.","slug":"ios-liquid-glass"}},"linkHandling":{"linkHandlingOverview":{"text":"Link handling settings control how links on pages are displayed within your app when they are opened. You can also configure deep linking to set links pointing to your website in text messages, emails and on other webpages to open within your app.","slug":"link-handling-overview"},"internalVsExternalLinks":{"text":"Define rules to specify which links will open internally within your app, launch within the in-app browser window, or open externally in the device's default browser or app. Rules are applied in order from top to bottom. By default links to URLs on domains different than your Website URL will open within the in-app browser. To change this default behavior scroll down to the \"All Other Links\" rule and update the dropdown from \"App Browser\" to \"Internal\".","slug":"internal-vs-external-links"},"newWindows":{"text":"By default a URL specified in the window.open() JavaScript function will load in a new window within your app similar to how a browser opens a new tab. When new windows are blocked your app will instead open the URL in the current webview. You can also use the Median Javascript Bridge to manually open and close webview windows.","slug":"new-windows"},"deepLinking":{"text":"Deep Links / Universal Links configure your device to open links pointing to your site in emails/text messages/other websites directly in your app rather than in a mobile browser. This provides a richer native app user experience.","slug":"deep-linking"},"urlSchemeProtocol":{"text":"URL Schemes are an advanced configuration option used to define a non-standard link format that will only open in your app and not in the device browser e.g. youruniquestring://yoursite.com/path. This functionality is helpful in authentication redirect flows or for a more seamless user experience. URL Schemes will only work on mobile devices and are not compatible with desktop browsers. We recommend only experienced developers implement this functionality.","slug":"url-scheme-protocol"},"contextMenu":{"text":"The Context Menu is a floating menu that is displayed when users long press on a link. You can enable/disable the Context Menu at runtime using the JavaScript Bridge and also select the specific actions to be displayed in the menu.","slug":"context-menu"}},"permissions":{"permissionsOverview":{"text":"Some device hardware and functionality requires specific permissions from the user to be able to be accessed by your app. Typically permission requests can be configured to be prompted when the app is first launched by the user or they can be prompted in-context when required at runtime via the JavaScript Bridge. Apple and Google encourage developers to request permission thoughtfully. If a user has declined you can suggest they enable the permission through the app's settings menu and then include a button that launches the app settings screen using the JavaScript Bridge.","slug":"permissions-overview"},"appleAtt":{"text":"Configure your app to be compliant with Apple's User Privacy and Data Use Policies using the AppTrackingTransparency Framework.","slug":"apple-att"},"backgroundAudio":{"text":"Background audio permission on iOS allows audio from the app to be played while the app is minimized or backgrounded. Use the Median JavaScript Bridge to start and stop the background audio service to make use of this feature.","slug":"background-audio"},"downloadsDirectory":{"text":"Android requires permission to allow downloading to the device public downloads directory. Otherwise, downloaded files will only be accessible within the app.","slug":"downloads-directory"},"locationServices":{"text":"If your app requires access to the device location in Android, you will need to enable this permission and then call a JavaScript Bridge command to request permission at runtime. For iOS, permission is only prompted at runtime. But to avoid both the app and your website prompting twice for location permission, you will need to use the function median_geolocation_ready() which is called when location services are initialized within the app.","slug":"location-services"},"webRtc":{"text":"You may enable WebRTC permissions within your app to support web-based audio and video applications that use the WebRTC framework. Similar to a standard browser, your app will request microphone and/or camera permission when your WebRTC app requires access.","slug":"web-rtc"},"iosPermissionDescriptions":{"text":"Apple requires permission descriptions that accurately represent how your app uses device functionality. Update the defaults when necessary to reflect your specific use case.","slug":"ios-permission-descriptions"},"nativeBridgeUrls":{"text":"By default all pages that are displayed in your app can access the Median JavaScript Bridge. You may optionally restrict access based on URL paths. This feature should be disabled during debugging.","slug":"native-bridge-urls"}},"webOverrides":{"websiteOverridesOverview":{"text":"Web Overrides allow you to control how your website is presented within your app and how your app sends requests to your web server. These configuration features and the Median JavaScript Bridge are key to building an immersive mobile app using Median. If you are using a JavaScript framework such as React or Vue.js be sure to install the median-js-bridge NPM Package which will help simplify your web to app integration.","slug":"website-overrides-overview"},"customUserAgent":{"text":"By default, a string is appended to the end of the device user agent so that you can identify requests originating from your app versus a standard mobile browser. You may choose to customize the string that is appended or provide a complete custom user agent to be used as a replacement instead of the device default user agent. Note that for apps initially created on GoNative.io the default string that is appended includes \"gonative\" while newer apps include \"median\".","slug":"custom-user-agent"},"customHeaders":{"text":"Your app can be configured to send custom headers to your web server. You can define parameter names and values and use both constant strings as well as device variables.","slug":"custom-headers"},"hidePageElements":{"text":"Hide specific html elements from displaying when pages are displayed through the app. This can be done using a CSS selector such as an ID or Class, e.g. #example_id, .example_class","slug":"hide-page-elements"},"customCss":{"text":"Custom CSS rules are applied to your website when it is displayed through your app. For instance, within your app you may need to hide navigation elements such as a footer menu or overlay elements such as a chat widget. CSS rules added in the top section are added to both iOS and Android apps.","slug":"custom-css"},"customJs":{"text":"Enter Custom JavaScript to be injected onto your website pages when they are displayed through your app. For instance, you may find it more convenient to specify JavaScript Bridge commands here rather than adding this code on your website itself. JavaScript added in the top section is injected in both iOS and Android apps or use the platform-specific sections if only needed for one of your apps. Format the JavaScript similar to an external .js file without any HTML or \u0026lt;script\u0026gt; tags.","slug":"custom-js"},"cookiePersistence":{"text":"By default, the cookie store in your app will respect the expiry parameters of cookies as received. Using this option you may force the expiry of all cookies to a preset duration. This functionality is useful for extending the duration of login sessions when it is not possible to make changes at the server level.","slug":"cookie-persistence"}},"nativeNavigation":{"nativeNavigationOverview":{"text":"Native Navigation menus allow you to create an intuitive native app experience for your users comparable to the most widely used and popular iOS and Android apps. Median supports a Top Navigation Bar, Sidebar Navigation Menu, Bottom Tab Bar Menu, and on iOS a Contextual Navigation Toolbar.","slug":"native-navigation-overview"},"topNavigationBar":{"text":"A native Top Navigation Bar can be used to help your users navigate throughout your app. You can display dynamic titles depending on the page being shown. You may also add a search bar form, refresh functionality, and custom buttons. When a Sidebar Navigation Menu is also enabled, a \"hamburger\" toggle button is shown in the top nav bar to easily open the menu.","slug":"top-navigation-bar"},"stylingTopNavigationBar":{"text":"Configure display settings for text in the top navigation bar and add an optional custom horizontal image. To show different content based on the page being shown in your app, configure Dynamic Titles. Note that for iOS the color of any native UI elements such as the hamburger menu will follow the app-wide Theme colors set on the Branding tab.","slug":"styling-top-navigation-bar"},"dynamicTitles":{"text":"By default, the Navigation Bar will display the App Name in Text mode. Define rules to display other titles in the Navigation Bar on specific pages or groups of pages. Dynamic Titles can also be set at run time via the JavaScript Bridge.","slug":"dynamic-titles"},"autoNewWindows":{"text":"Define a hierarchy for your website so that pages in a higher level will open in a new window within your app versus the current view. The top navigation bar will show a \"\u0026lt; Back\" button to allow easy navigation back to the same place on the lower level page.","slug":"auto-new-windows"},"searchBarForm":{"text":"Add a native search form to your top navigation bar.","slug":"search-bar-form"},"refreshButton":{"text":"Add a Refresh button to your top navigation bar.","slug":"refresh-button"},"shareButton":{"text":"Add a native Share button to your top navigation bar.","slug":"share-button"},"addCustomButtons":{"text":"Add custom buttons to the right side of the Top Navigation Bar and configure them to link to URLs or to run JavaScript commands.","slug":"add-custom-buttons"},"hideTopNavBarWithScroll":{"text":"","slug":""},"topNavVisualEditor":{"text":"","slug":""},"sidebarNavigationMenu":{"text":"A Sidebar Navigation Menu is a standard navigation feature that is highly configurable. Users access the navigation menu through a \"hamburger\" toggle button if a Top Nav Bar is enabled, or by sliding from the left side of the screen. The menu items in the sidebar nav menu can be configured with an optional icon and in collapsible groupings. The sidebar menu items can be configured within the app configuration as well as set dynamically via the JavaScript Bridge.","slug":"sidebar-navigation-menu"},"stylingSidebar":{"text":"iOS and Android styling is configured independently. The iOS sidebar menu follows Apple's Human Interface Guidelines while the Android sidebar menu follows Google Material Design principles.","slug":"styling-sidebar"},"sidebarConfiguration":{"text":"The sidebar visual editor allows you to visually modify icons, labels and links for your Sidebar Navigation Menu. Change menu item order and add groupings which expand and collapse. Menu items can be added to a group by dragging to the right within the visual editor. Note that icons are optional in sidebar menus.","slug":"sidebar-configuration"},"dynamicMenuItems":{"text":"Sidebar menu items can be loaded dynamically from your website using the Median Javascript Bridge. The new menu items can be loaded on specific pages or subsequent to events such as a user login flow. A default menu can be defined in the app configuration that is then overwritten dynamically as required. Or alternatively, the configuration can be left blank and all menus set by the website.","slug":"dynamic-menu-items"},"bottomTabBar":{"text":"A Bottom Tab Bar menu is the most common native navigation menu component. You can configure your app with multiple tab bar menus to show on different pages and define optional icons and labels for each menu. You can also set and control the tab bar menu at runtime from your website using the JavaScript Bridge.","slug":"bottom-tab-bar"},"stylingBottomTabBar":{"text":"Configure display settings for text in the top navigation bar and add an optional custom horizontal image. To show different content based on the page being shown in your app, configure Dynamic Titles. Note that for iOS the color of any native UI elements such as the hamburger menu will follow the app-wide Theme colors set on the Branding tab.","slug":"styling-bottom-tab-bar"},"tabConfiguration":{"text":"Specify icons, text labels, and links to include in each tab menu item. You can create multiple bottom tab bar menus and set different visibility rules to show each menu based on the page that is displaying within your app. Preview your tab bar menus on iOS and Android in Light and Dark mode.","slug":"tab-configuration"},"dynamicTabMenu":{"text":"Similar to the Sidebar Navigation Menu, tab menu items can also be loaded dynamically from your website using the Median JavaScript Bridge. The tab menu items can be loaded on specific pages or subsequent to events such as a user login flow.","slug":"dynamic-tab-menu"},"customIcons":{"text":"Custom navigation icons can be added using Fontello. On the \\\"Custom\\\" tab click \\\"Add Custom Icons\\\" or “Manage Icons” to launch Fontello, and add new icons by clicking the gear icon and then clicking “Import”. We recommend uploading monochrome SVG files between 16x16px and 32x32px in size. Ensure that the CSS prefix is set to \\\"icon-\\\" and \\\"add after icon name\\\" is unchecked. When complete select and highlight the icons you wish to load to your app and then click “Export font” to return to your app. You can then use your custom icons for all native navigation components.","slug":"custom-icons"},"contextualNavigationToolbar":{"text":"Unlike Android devices iPhones and iPads do not have a built-in back button, which can make navigating your website from within your app challenging. This feature provides a native navigation toolbar that shows on the bottom of the device screen dependent on navigation history and page URL. By default, the toolbar will include a Back button but it can be customized to also show with Forward and Refresh buttons.","slug":"contextual-navigation-toolbar"},"contextualNavToolbarDynamicVisibility":{"text":"The iOS Contextual Navigation Toolbar can be enabled and disabled dynamically from your website using the Median Javascript Bridge.","slug":"contextual-nav-toolbar-dynamic-visibility"},"customNavIcons":{"text":"Custom navigation icons can be added using Fontello. Click “Manage Icons” to launch Fontello, and add new icons by clicking the gear icon and then clicking “Import”. Ensure that CSS prefix is set to \\\"icon-\\\" and \\\"add after icon name\\\" is unchecked. When complete select and highlight the icons you wish to load to your app and then click “Export font” to return to your app.","slug":"custom-nav-icons"}},"pushNotifications":{"managingPermissionsAndConsent":{"text":"Use a soft-prompt in-app message to request push notification permission from users with full context before launching the native iOS permission prompt.","slug":"managing-permissions-and-consent"},"pushRegistrationAndPrivacyConsent":{"text":"By default your app will automatically prompt the user to allow push notifications on the first launch of the app. You may optionally delay the push notification prompt and trigger manually via Javascript. By default your app will automatically transmit data to OneSignal including obtaining a \\`oneSignalUserId\\`. To facilitate privacy policy compliance you may optionally defer communication with OneSignal until consent is provided by the user.","slug":"push-registration-and-privacy-consent"},"iosSoftPrompt":{"text":"Use a soft-prompt in-app message to request push notification permission from users with full context before launching the native iOS permission prompt.","slug":"ios-soft-prompt"},"onesignalUserManagement":{"text":"Send personalized push notifications to your users using OneSignal's user management functionality and logging in the current user using an identifier such as email address or account number. For advanced use cases you can target a specific device using \\`subscription.id\\`.","slug":"onesignal-user-management"},"autoRegister":{"text":"By default, on first launch your app will automatically register for push notifications and prompt for user consent. When set to manual, you must initiate registration using the JavaScript Bridge.","slug":"auto-register"},"pushRegistrationAndPrivacy":{"text":"By default, your app will automatically send device data to OneSignal prior to requesting push notification consent. This includes obtaining a oneSignalUserId which can be used to associate the device and user. To facilitate GDPR compliance, you may set this to manual which will defer sending device data until you obtain consent from the user. You must then use the JavaScript Bridge to confirm consent has been granted and begin transmitting data.","slug":"push-registration-and-privacy"},"androidNotificationIcon":{"text":"Android notification icons must be monochromatic with a transparent background. iOS notifications will use the app icon by default.","slug":"android-notification-icon"},"customNotificationSounds":{"text":"Optionally include your own custom notification sounds in OneSignal. These sounds (in .mp3 or .wav format) will play on the user’s device when the push notification is received.","slug":"custom-notification-sounds"},"foregroundNotifications":{"text":"Control whether notifications are displayed while your app is in the foreground on the user’s device. This setting can be set in advance at build time or changed dynamically at runtime.","slug":"foreground-notifications"},"applicationId":{"text":"Median requires just your OneSignal App Id to configure OneSignal to send notifications to your app. You will find this on your OneSignal Dashboard under App Settings -\u0026gt; Keys \u0026amp; IDs.","slug":"application-id"},"tagsJsonUrl":{"text":"Display a native UI within your app which users can use to toggle OneSignal data tags on/off to self-manage their subscriptions. Host a JSON file which your app will load dynaically at runtime to determine the data tags to display in the UI.","slug":"tags-json-url"},"onesignalLegacyMode":{"text":"Your app will integrate with the latest OneSignal iOS and Android SDKs (v5+) and user-centric data model by default. With Legacy Mode enabled your app will instead fall back to OneSignal’s previous iOS v3 SDK and Android v4 SDK, which both support the device-centric data model. To migrate your app disable this setting and refer to OneSignal’s User Model Migration Guide as linked in our documentation.","slug":"onesignal-legacy-mode"}},"medianJavaScriptBridge":{"npmPackage":{"text":"When using the Median JavaScript Bridge NPM package within your web app you must enable the \"Use NPM Package\" option in the App Studio to prevent the use of your native app's embedded JavaScript Bridge Library and to provide support for listeners. If you enable \"Use NPM Package\" but do not include the NPM package in your web app, standard JavaScript Bridge functions and callbacks will not be available.","slug":"npm-package"}},"nativePlugins":{"facebook":{"text":"Meta App Events enable you to view analytics, measure Meta Ad performance, and build audiences for Meta Ad targeting using the Facebook SDK.","slug":"facebook"},"socialLogin":{"text":"Median's Social Login Native Plugin facilitates a seamless native login experience for end users using any combination of Facebook Login, Google Sign-in and Sign in with Apple.","slug":"social-login"},"copyOfSocialLogin":{"text":"Median's Social Login Native Plugin facilitates a seamless native login experience for end users using any combination of Facebook Login, Google Sign-in and Sign in with Apple.","slug":"copy-of-social-login"},"enterprisePlugin":{"text":"Strengthen your application’s security and meet corporate IT compliance standards by integrating advanced security features using our Enterprise Plugin.","slug":"enterprise-plugin"},"nfcTagScanner":{"text":"Scan data from Near Field Communication (NFC) tags as part of in-store shopping experience, warehouse tracking, digital+physical game, or any similar use case.","slug":"nfc-tag-scanner"}},"websiteBuilders":{},"buildTest":{"appDownload":{"text":"Generate iOS and Android build files, download previous builds, and upload iOS builds directly to App Store Connect. An iOS IPA is required for the Apple App Store, an Android AAB is required for Google Play.","slug":"app-studio#download-and-build-you
